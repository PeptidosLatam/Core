<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Producto - BIOSTOCK LATAM</title>
    <style>
        /* Estilos generales para que se vea moderno y adaptado a móviles */
        body {
            background-color: #050a12; /* Fondo oscuro similar a tu imagen */
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        
        .container {
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }

        /* Estilo para el logo */
        .logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 40px;
        }

        /* Contenedor del mensaje de validación */
        .validation-box {
            background-color: #10b981; /* Verde de éxito */
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .check-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .message {
            font-size: 22px;
            font-weight: bold;
            margin: 0;
            letter-spacing: 1px;
        }

        .footer-text {
            margin-top: 30px;
            color: #8fa0b5;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="BIOSTOCK LATAM" class="logo">

        <div class="validation-box">
            <div class="check-icon">✅</div>
            <p class="message">TU PRODUCTO ES VÁLIDO</p>
        </div>

        <p class="footer-text">Gracias por confiar en productos originales.</p>
    </div>

</body>
</html>
